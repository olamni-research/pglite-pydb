name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        node-version: ["22"]
        include:
          # Node 20 LTS smoke cells — one per OS (research.md R11, Q4)
          - os: ubuntu-latest
            python-version: "3.12"
            node-version: "20"
          - os: windows-latest
            python-version: "3.12"
            node-version: "20"
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Setup Environment
      uses: ./.github/actions/setup-environment
      with:
        python-version: ${{ matrix.python-version }}
        run-tests: true
        coverage: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' }}

    - name: Run tests with xdist (-n auto) to catch parallel regressions
      # FR-011a: pytest-xdist is first-class; each worker must acquire a
      # distinct ephemeral TCP port without collisions. Runs after the
      # serial suite so failure mode is obvious.
      shell: bash
      run: |
        uv run pytest tests/ -n auto --tb=short -q
      continue-on-error: false

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        files: ./coverage.xml
        name: codecov-umbrella
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  test-package:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Test package installation
      shell: bash
      run: |
        python -m pip install --upgrade pip build
        python -m build
        pip install dist/pglite_pydb-*.whl

    - name: Test installed package
      shell: bash
      run: |
        python -c "import pglite_pydb; print(f'Successfully imported pglite-pydb {pglite_pydb.__version__}')"
        python -c "from pglite_pydb import PGliteManager, PGliteConfig; print('All imports working')"

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Install dependencies
      run: |
        pip --disable-pip-version-check install pre-commit

    - name: Run pre-commit
      run: pre-commit run --all-files

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Install dependencies
      run: |
        pip --disable-pip-version-check install safety

    - name: Run Safety CLI to check for vulnerabilities
      uses: pyupio/safety-action@v1
      with:
        api-key: ${{ secrets.SAFETY_API_KEY }}
