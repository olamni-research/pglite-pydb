name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        node-version: ["22"]
        include:
          # Node 20 LTS smoke cells — one per OS (research.md R11, Q4)
          - os: ubuntu-latest
            python-version: "3.12"
            node-version: "20"
          - os: windows-latest
            python-version: "3.12"
            node-version: "20"
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Setup Environment
      uses: ./.github/actions/setup-environment
      with:
        python-version: ${{ matrix.python-version }}
        run-tests: true
        coverage: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11' }}

    # Feature 003 (T063a): pg_dump / psql are runtime prereqs for
    # logical backup & restore. Tests marked `requires_pg_dump` skip when
    # absent, but on CI we want them to actually run so FR-029's
    # "tests MUST pass on Linux AND Windows" has teeth.
    - name: Install PostgreSQL client tools (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client-16 || sudo apt-get install -y postgresql-client
        pg_dump --version
        psql --version

    - name: Add PostgreSQL client tools to PATH (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # windows-latest runners preinstall PostgreSQL under C:\Program Files\PostgreSQL\<ver>\bin
        $pg = Get-ChildItem "C:\Program Files\PostgreSQL" -Directory -ErrorAction SilentlyContinue `
              | Sort-Object Name -Descending | Select-Object -First 1
        if (-not $pg) { throw "No PostgreSQL installation found on runner" }
        $bin = Join-Path $pg.FullName "bin"
        Add-Content -Path $env:GITHUB_PATH -Value $bin
        & "$bin\pg_dump.exe" --version
        & "$bin\psql.exe" --version

    - name: Run tests with xdist (-n auto) to catch parallel regressions
      # FR-011a: pytest-xdist is first-class; each worker must acquire a
      # distinct ephemeral TCP port without collisions. Runs after the
      # serial suite so failure mode is obvious.
      shell: bash
      run: |
        uv run pytest tests/ -n auto --tb=short -q
      continue-on-error: false

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v5
      with:
        fail_ci_if_error: true
        files: ./coverage.xml
        name: codecov-umbrella
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  windows-sample-db:
    name: windows-sample-db (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false
    steps:
    - uses: actions/checkout@v4

    - name: Setup Environment
      uses: ./.github/actions/setup-environment
      with:
        python-version: "3.12"
        run-tests: false

    - name: Install windows-sample-db extras
      shell: bash
      run: |
        uv sync --extra windows-sample-db
        # Node deps for the bridge
        npm install

    - name: Run windows_sample_db suite
      # On Windows → full run (73 tests). On Linux → collect-only +
      # assert every module was skipped with "requires Windows".
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          uv run pytest tests/windows_sample_db -v
        else
          uv run pytest tests/windows_sample_db --collect-only -q 2>&1 \
            | tee collect.log
          grep -q "skipped" collect.log || (echo "expected Linux skip"; exit 1)
        fi

  test-package:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Test package installation
      shell: bash
      run: |
        python -m pip install --upgrade pip build
        python -m build
        pip install dist/pglite_pydb-*.whl

    - name: Test installed package
      shell: bash
      run: |
        python -c "import pglite_pydb; print(f'Successfully imported pglite-pydb {pglite_pydb.__version__}')"
        python -c "from pglite_pydb import PGliteManager, PGliteConfig; print('All imports working')"

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Install dependencies
      run: |
        pip --disable-pip-version-check install pre-commit

    - name: Run pre-commit
      run: pre-commit run --all-files

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5

    - name: Install dependencies
      run: |
        pip --disable-pip-version-check install safety

    - name: Run Safety CLI to check for vulnerabilities
      uses: pyupio/safety-action@v1
      with:
        api-key: ${{ secrets.SAFETY_API_KEY }}
